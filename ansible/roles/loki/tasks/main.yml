---
- name: Create Loki group
  group:
    name: "{{ loki_group }}"
    system: yes


- name: Create Loki user
  user:
    name: "{{ loki_user }}"
    group: "{{ loki_group }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no


- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0755"
  loop:
    - "{{ loki_config_dir }}"
    - "{{ loki_data_dir }}"
    - "{{ loki_data_dir }}/chunks"
    - "{{ loki_data_dir }}/rules"


- name: Download Loki
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: /tmp/loki.zip
    mode: "0644"


- name: Install unzip
  apt:
    name: unzip
    state: present


- name: Extract Loki
  unarchive:
    src: /tmp/loki.zip
    dest: /tmp
    remote_src: yes


- name: Install Loki binary
  copy:
    src: /tmp/loki-linux-amd64
    dest: "{{ loki_binary_path }}"
    remote_src: yes
    owner: root
    group: root
    mode: "0755"


- name: Install Loki configuration
  template:
    src: loki-config.yml.j2
    dest: "{{ loki_config_dir }}/loki-config.yml"
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0644"
  notify: Restart Loki


- name: Install Loki systemd service
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service


- name: Reload systemd
  systemd:
    daemon_reload: yes


- name: Enable Loki
  systemd:
    name: loki
    enabled: yes
    state: started