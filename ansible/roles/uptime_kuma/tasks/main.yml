---
- name: Install required packages
  apt:
    name:
      - git
      - curl
      - nodejs
      - npm
    state: present
    update_cache: yes

- name: Create Uptime Kuma directory
  file:
    path: /opt/uptime-kuma
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Uptime Kuma data directory
  file:
    path: /opt/uptime-kuma/data
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Clone Uptime Kuma
  git:
    repo: https://github.com/louislam/uptime-kuma.git
    dest: /opt/uptime-kuma
    version: master

- name: Install Node dependencies
  command:
    cmd: npm run setup
    chdir: /opt/uptime-kuma

- name: Install systemd service
  template:
    src: uptime-kuma.service.j2
    dest: /etc/systemd/system/uptime-kuma.service
  notify: Restart Uptime Kuma

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start Uptime Kuma
  systemd:
    name: uptime-kuma
    enabled: yes
    state: started