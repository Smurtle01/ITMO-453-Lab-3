---
- name: Update package cache
  apt:
    update_cache: yes

- name: Install git and curl
  apt:
    name:
      - git
      - curl
    state: present

- name: Create backup directory
  file:
    path: /backups
    state: directory
    mode: '0755'

- name: Schedule weekly updates
  cron:
    name: "weekly updates"
    minute: "0"
    hour: "3"
    weekday: "0"
    job: "apt update && apt upgrade -y"